<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .input-ring:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen">

  <div class="w-full max-w-lg bg-white border border-slate-200 rounded-2xl shadow-sm p-10">
    
    <header class="mb-10">
      <h1 class="text-2xl font-semibold text-slate-900 tracking-tight">Get in touch</h1>
      <p class="text-slate-500 mt-2 text-sm">Send us a message and our team will respond shortly.</p>
    </header>

    <div class="space-y-6">
      <div class="grid grid-cols-1 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
          <input 
            id="name"
            type="text"
            placeholder="John Doe"
            class="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder:text-slate-400 input-ring transition-all"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
          <input 
            id="email"
            type="email"
            placeholder="name@company.com"
            class="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder:text-slate-400 input-ring transition-all"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Message</label>
          <textarea 
            id="message"
            placeholder="Provide a brief description of your inquiry..."
            class="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder:text-slate-400 input-ring transition-all resize-none"
            rows="5"
          ></textarea>
        </div>
      </div>

      <button 
        onclick="submitForm(this)"
        class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3.5 rounded-lg transition-colors duration-200 flex items-center justify-center"
      >
        <span id="btnText">Send Message</span>
      </button>

      <div id="statusBox" class="hidden py-3 px-4 rounded-lg text-sm font-medium text-center"></div>
    </div>
  </div>

<script>
  const WEBHOOK_URL = "YOUR_WEBHOOK_URL";

  async function submitForm(button) {
    const nameField = document.getElementById("name");
    const emailField = document.getElementById("email");
    const messageField = document.getElementById("message");
    const statusBox = document.getElementById("statusBox");
    const btnText = document.getElementById("btnText");

    const payload = {
      name: nameField.value.trim(),
      email: emailField.value.trim(),
      message: messageField.value.trim()
    };

    if (!payload.name || !payload.email || !payload.message) {
      updateStatus("Please complete all fields.", "bg-red-50 text-red-700 border border-red-100");
      return;
    }

    button.disabled = true;
    btnText.innerText = "Sending...";
    statusBox.classList.add("hidden");

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        updateStatus("Thank you. Your message has been received.", "bg-emerald-50 text-emerald-700 border border-emerald-100");
        
        nameField.value = "";
        emailField.value = "";
        messageField.value = "";
      } else {
        throw new Error();
      }
    } catch (error) {
      updateStatus("An error occurred. Please try again.", "bg-red-50 text-red-700 border border-red-100");
    } finally {
      button.disabled = false;
      btnText.innerText = "Send Message";
    }
  }

  function updateStatus(text, classes) {
    const statusBox = document.getElementById("statusBox");
    statusBox.innerText = text;
    statusBox.className = `block py-3 px-4 rounded-lg text-sm font-medium text-center ${classes}`;
  }
</script>

</body>
</html>
